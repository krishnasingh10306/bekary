<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishna Ki Bekary | Artisan Brownies</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a class="brand" href="{{ url_for('home') }}"><span class="logo-mark">KB</span> Krishna Ki Bekary</a>
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links" id="nav-links" aria-label="Main navigation">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('menu') }}">Menu</a>
        <a href="{{ url_for('about') }}">About</a>
        <a class="nav-cart" href="{{ url_for('checkout') }}">Cart <span class="cart-count" id="cart-count">0</span></a>
        <a href="{{ url_for('track') }}">Track</a>
        {% if g.current_user %}
          <a href="{{ url_for('account') }}">My Account</a>
          <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
          <a class="button button-secondary" href="{{ url_for('login') }}">Sign In</a>
        {% endif %}
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <p>&copy; 2026 Krishna Ki Bekary. Artisan brownies, elegant gifting, and fresh local delivery.</p>
  </footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
